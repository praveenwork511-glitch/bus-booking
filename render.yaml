services:
  - type: web
    name: bus-booking
    runtime: python
    pythonVersion: 3.9
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: DATABASE_URL
        fromDatabase:
          name: bus-booking-db
          property: connectionString
