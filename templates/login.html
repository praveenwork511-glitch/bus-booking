<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bus Booking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='home_style.css') }}">
</head>

<body class="home-body">
    <div class="bg-overlay"></div>
    <div class="main-box">
    <nav class="navbar custom-nav">
        <div class="container">
            <h1>🚌 VelvetBus</h1>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/register">Register</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h2>✨ Welcome Back</h2>
                {% with messages = get_flashed_messages(category_filter=['error']) %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-error">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <form method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="email">📧 Email Address</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">🔐 Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>

                <p class="auth-link">New to BusBook? <a href="{{ url_for('register') }}">Create an account</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 BusBook - Book Your Journey Today</p>
    </footer>

</div>
    <!-- Vanta 3D Background -->
<div id="vanta-bg" style="position: fixed; z-index: -1; top: 0; left: 0; width: 100%; height: 100%;"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x00d4ff,
      backgroundColor: 0x080b1f,
      points: 15.00,
      maxDistance: 22.00,
      spacing: 16.00,
      showDots: true
    })
</script>
</body>

</html>
